name: Release Prod

on:
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'ride2trip' }}

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      auth_changed: ${{ steps.filter.outputs.auth }}
      gateway_changed: ${{ steps.filter.outputs.gateway }}
      infra_changed: ${{ steps.filter.outputs.infra }}
      postgres_changed: ${{ steps.filter.outputs.postgres }}
      any_changed: ${{ steps.filter.outputs.auth == 'true' || steps.filter.outputs.gateway == 'true' || steps.filter.outputs.infra == 'true' || steps.filter.outputs.postgres == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            gateway:
              - 'services/gateway-service/**'
            infra:
              - 'infra/**'
            postgres:
              - 'infra/configs/postgres/**'
      - name: Log detected changes
        run: |
          echo "auth_changed=${{ steps.filter.outputs.auth }}"
          echo "gateway_changed=${{ steps.filter.outputs.gateway }}"
          echo "infra_changed=${{ steps.filter.outputs.infra }}"
          echo "postgres_changed=${{ steps.filter.outputs.postgres }}"

  lint_test:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.any_changed == 'true'
    strategy:
      matrix:
        include:
          - service: auth-service
            changed_key: auth_changed
          - service: gateway-service
            changed_key: gateway_changed
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        if: needs.detect_changes.outputs[matrix.changed_key] == 'true'
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/**/requirements.txt
            **/pyproject.toml

      - name: Install deps
        if: needs.detect_changes.outputs[matrix.changed_key] == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/${{ matrix.service }}/requirements.txt
          python -m pip install ruff
          python -m pip install -r ./requirements.test.txt


      - name: Lint (ruff)
        if: needs.detect_changes.outputs[matrix.changed_key] == 'true'
        run: ruff check --select F,E9 services/${{ matrix.service }}

      - name: Tests
        if: needs.detect_changes.outputs[matrix.changed_key] == 'true'
        working-directory: services/${{ matrix.service }}
        run: pytest -q

  build_push:
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - lint_test
    outputs:
      image_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: services/auth-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/auth-service:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway-service
        uses: docker/build-push-action@v6
        with:
          context: services/gateway-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/gateway-service:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push postgres
        uses: docker/build-push-action@v6
        with:
          context: infra/configs/postgres
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/postgres:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - build_push
    environment: PROD
    env:
      AUTH_SERVICE_VERSION: ${{ needs.build_push.outputs.image_version || github.ref_name }}
      GATEWAY_SERVICE_VERSION: ${{ needs.build_push.outputs.image_version || github.ref_name }}
      POSTGRES_IMAGE_VERSION: ${{ needs.build_push.outputs.image_version || github.ref_name }}
      GATEWAY_PORT: ${{ secrets.GATEWAY_PORT }}
      ORIGIN: ${{ vars.ORIGIN }}
      LK_PATH: ${{ vars.LK_PATH }}
      REFRESH_TOKEN_PATH: ${{ vars.REFRESH_TOKEN_PATH }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'ride2trip' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gettext

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H "${{ secrets.SWARM_HOST }}" >> ~/.ssh/known_hosts

      - name: Create docker context
        run: |
          docker context create swarm --docker "host=ssh://${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }}"
          docker --context swarm info

      - name: Ensure swarm networks
        run: |
          set -euo pipefail
          for network in data-network internal-network; do
            if docker --context swarm network inspect "$network" >/dev/null 2>&1; then
              echo "Network '$network' already exists"
            else
              echo "Creating network '$network'"
              docker --context swarm network create --driver overlay --attachable "$network"
            fi
          done

      - name: Deploy data stack
        run: |
          set -euo pipefail
          envsubst < infra/stacks/data-stack.yml | docker --context swarm stack deploy -c - data

      - name: Wait for postgres
        run: |
          set -euo pipefail
          timeout 300 bash -c 'while true; do
            replicas="$(docker --context swarm service ls --filter name=data_postgres --format "{{.Replicas}}" | head -n1)"
            echo "data_postgres replicas=$replicas"
            if [ "$replicas" = "1/1" ]; then
              exit 0
            fi
            sleep 5
          done'

      - name: Run auth migrations
        run: |
          set -euo pipefail
          bash infra/run-swarm-migrations.sh \
            swarm \
            "$GITHUB_RUN_ID" \
            auth \
            "${DOCKERHUB_NAMESPACE}/auth-service:${AUTH_SERVICE_VERSION}"

      - name: Deploy stacks
        run: |
          set -euo pipefail
          envsubst < infra/stacks/gateway-stack.yml | docker --context swarm stack deploy -c - gate
          envsubst < infra/stacks/app-stack.yml | docker --context swarm stack deploy -c - apps
