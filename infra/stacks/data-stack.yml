services:
  # PostgreSQL
  postgres:
    image: kartoza/postgis:18-3.6
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - postgres-data:/var/lib/postgresql/data
    configs:
      - source: init-multi-db.sh
        target: /docker-entrypoint-initdb.d/init-multi-db.sh
    secrets:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
      - DB_AUTH_SERVICE_NAME
      - DB_AUTH_SERVICE_PASS
      - DB_AUTH_SERVICE_USER
      - DB_PROFILE_SERVICE_NAME
      - DB_PROFILE_SERVICE_PASS
      - DB_PROFILE_SERVICE_USER
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
      POSTGRES_USER_FILE: /run/secrets/POSTGRES_USER
      POSTGRES_MULTIPLE_DATABASES: auth,profile
      DB_AUTH_SERVICE_NAME_FILE: /run/secrets/DB_AUTH_SERVICE_NAME
      DB_AUTH_SERVICE_PASS_FILE: /run/secrets/DB_AUTH_SERVICE_PASS
      DB_AUTH_SERVICE_USER_FILE: /run/secrets/DB_AUTH_SERVICE_USER
      DB_PROFILE_SERVICE_NAME_FILE: /run/secrets/DB_PROFILE_SERVICE_NAME
      DB_PROFILE_SERVICE_PASS_FILE: /run/secrets/DB_PROFILE_SERVICE_PASS
      DB_PROFILE_SERVICE_USER_FILE: /run/secrets/DB_PROFILE_SERVICE_USER
    networks:
      - data-network

  # Redis
  redis:
    image: redis:8.4.0-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - data-network

networks:
  data-network:
    external: true

volumes:
  postgres-data:

configs:
  init-multi-db.sh:
    file: ../configs/postgres/init-multi-db.sh

secrets:
  POSTGRES_PASSWORD:
    external: true
  POSTGRES_USER:
    external: true
  DB_AUTH_SERVICE_NAME:
    external: true
  DB_AUTH_SERVICE_PASS:
    external: true
  DB_AUTH_SERVICE_USER:
    external: true
  DB_PROFILE_SERVICE_NAME:
    external: true
  DB_PROFILE_SERVICE_PASS:
    external: true
  DB_PROFILE_SERVICE_USER:
    external: true
