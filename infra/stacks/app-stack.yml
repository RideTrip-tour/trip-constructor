services:
  
  auth-service:
    image: ride2trip/auth-service:${AUTH_SERVICE_VERSION}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    secrets:
      # Auth
      - JWT_SECRET
      - JWT_ALGORITHM

      # Gateway identity
      - GATEWAY_NAME

      # Debug
      - DEBUG

      # Redis
      - REDIS_URL
      - REDIS_HOST
      - REDIS_PORT

      # Database
      - DB_AUTH_SERVICE_HOST
      - DB_AUTH_SERVICE_PORT
      - DB_AUTH_SERVICE_NAME
      - DB_AUTH_SERVICE_USER
      - DB_AUTH_SERVICE_PASS

      # Email
      - MAIL_SERVER
      - MAIL_PORT
      - MAIL_USERNAME
      - MAIL_PASSWORD
      - MAIL_FROM
      - MAIL_FROM_NAME
      - MAIL_STARTTLS
      - MAIL_SSL_TLS

      # Token Expire
      - ACCESS_TOKEN_EXPIRE_SEC
      - REFRESH_TOKEN_EXPIRE_SEC

      # OAuth
      - GOOGLE_OAUTH_CLIENT_ID
      - GOOGLE_OAUTH_CLIENT_SECRET

      # App URLs
      - REFRESH_TOKEN_NAME
    environment:
      # Auth
      JWT_SECRET_FILE: /run/secrets/JWT_SECRET
      JWT_ALGORITHM_FILE: /run/secrets/JWT_ALGORITHM

      # Gateway identity
      GATEWAY_NAME_FILE: /run/secrets/GATEWAY_NAME

      # Debug
      DEBUG_FILE: /run/secrets/DEBUG

      # Redis
      REDIS_URL_FILE: /run/secrets/REDIS_URL
      REDIS_HOST_FILE: /run/secrets/REDIS_HOST
      REDIS_PORT_FILE: /run/secrets/REDIS_PORT

      # Database
      DB_AUTH_SERVICE_HOST_FILE: /run/secrets/DB_AUTH_SERVICE_HOST
      DB_AUTH_SERVICE_PORT_FILE: /run/secrets/DB_AUTH_SERVICE_PORT
      DB_AUTH_SERVICE_NAME_FILE: /run/secrets/DB_AUTH_SERVICE_NAME
      DB_AUTH_SERVICE_USER_FILE: /run/secrets/DB_AUTH_SERVICE_USER
      DB_AUTH_SERVICE_PASS_FILE: /run/secrets/DB_AUTH_SERVICE_PASS

      # Email
      MAIL_SERVER_FILE: /run/secrets/MAIL_SERVER
      MAIL_PORT_FILE: /run/secrets/MAIL_PORT
      MAIL_USERNAME_FILE: /run/secrets/MAIL_USERNAME
      MAIL_PASSWORD_FILE: /run/secrets/MAIL_PASSWORD
      MAIL_FROM_FILE: /run/secrets/MAIL_FROM
      MAIL_FROM_NAME_FILE: /run/secrets/MAIL_FROM_NAME
      MAIL_STARTTLS_FILE: /run/secrets/MAIL_STARTTLS
      MAIL_SSL_TLS_FILE: /run/secrets/MAIL_SSL_TLS
      
      # Token Expire
      ACCESS_TOKEN_EXPIRE_SEC_FILE: /run/secrets/ACCESS_TOKEN_EXPIRE_SEC
      REFRESH_TOKEN_EXPIRE_SEC_FILE: /run/secrets/REFRESH_TOKEN_EXPIRE_SEC

      # OAuth
      GOOGLE_OAUTH_CLIENT_ID_FILE: /run/secrets/GOOGLE_OAUTH_CLIENT_ID
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/GOOGLE_OAUTH_CLIENT_SECRET

      # App URLs
      ORIGIN: ${ORIGIN}
      LK_PATH: ${LK_PATH}
      REFRESH_TOKEN_PATH: ${REFRESH_TOKEN_PATH}
      REFRESH_TOKEN_NAME_FILE: /run/secrets/REFRESH_TOKEN_NAME
      
      # Settings
      DEPLOY_ENV: swarm

    networks:
      - internal-network
      - data-network

  profile-service:
    image: ride2trip/prifile-service:${PROFILE_SERVICE_VERSION}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    secrets:
      # Auth
      - JWT_SECRET
      - JWT_ALGORITHM

      # Gateway identity
      - GATEWAY_NAME

      # Debug
      - DEBUG

      # Redis
      - REDIS_URL
      - REDIS_HOST
      - REDIS_PORT

      # Database
      - DB_PROFILE_SERVICE_HOST
      - DB_PROFILE_SERVICE_PORT
      - DB_PROFILE_SERVICE_NAME
      - DB_PROFILE_SERVICE_USER
      - DB_PROFILE_SERVICE_PASS

      
    environment:
      # Auth
      JWT_SECRET_FILE: /run/secrets/JWT_SECRET
      JWT_ALGORITHM_FILE: /run/secrets/JWT_ALGORITHM

      # Gateway identity
      GATEWAY_NAME_FILE: /run/secrets/GATEWAY_NAME

      # Debug
      DEBUG_FILE: /run/secrets/DEBUG

      # Redis
      REDIS_URL_FILE: /run/secrets/REDIS_URL
      REDIS_HOST_FILE: /run/secrets/REDIS_HOST
      REDIS_PORT_FILE: /run/secrets/REDIS_PORT

      # Database
      DB_PROFILE_SERVICE_HOST_FILE: /run/secrets/DB_PROFILE_SERVICE_HOST
      DB_PROFILE_SERVICE_PORT_FILE: /run/secrets/DB_PROFILE_SERVICE_PORT
      DB_PROFILE_SERVICE_NAME_FILE: /run/secrets/DB_PROFILE_SERVICE_NAME
      DB_PROFILE_SERVICE_USER_FILE: /run/secrets/DB_PROFILE_SERVICE_USER
      DB_PROFILE_SERVICE_PASS_FILE: /run/secrets/DB_PROFILE_SERVICE_PASS

      
      # Settings
      DEPLOY_ENV: swarm

    networks:
      - internal-network
      - data-network



networks:
  internal-network:
    external: true
  data-network:
      external: true

