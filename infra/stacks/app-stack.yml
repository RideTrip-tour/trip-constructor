  DB_AUTH_SERVICE_PORT:
    external: true
  DB_AUTH_SERVICE_NAME:
    external: true
  DB_AUTH_SERVICE_USER:
    external: true
  DB_AUTH_SERVICE_PASS:
    external: true

  # Database PROFILE
  DB_PROFILE_SERVICE_HOST:
    external: true
  DB_PROFILE_SERVICE_PORT:
    external: true
  DB_PROFILE_SERVICE_NAME:
    external: true
  DB_PROFILE_SERVICE_USER:
    external: true
  DB_PROFILE_SERVICE_PASS:
    external: true

  # Email
  MAIL_SERVER:
    external: true
  MAIL_PORT:
    external: true
  MAIL_USERNAME:
    external: true
  MAIL_PASSWORD:
    external: true
  MAIL_FROM:
    external: true
  MAIL_FROM_NAME:
    external: true
  MAIL_STARTTLS:
    external: true
  MAIL_SSL_TLS:
    external: true
  # Token Expire
  ACCESS_TOKEN_EXPIRE_SEC:
    external: true
  REFRESH_TOKEN_EXPIRE_SEC:
    external: true
  # OAuth
  GOOGLE_OAUTH_CLIENT_ID:
    external: true
